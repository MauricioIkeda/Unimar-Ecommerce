{% extends "base.html" %}

{% block body %}

<div class="register-div">
    {% if messages %}
        {% for message in messages %}
            <div class="messages-box">
                <div>
                    {{ message }}
                </div>
            </div>
        {% endfor %}
    {% endif %}
    
    <form class="register-form" action="{% url 'cadastrar' %}" method="POST"> {% csrf_token %}
        <h1 class="title-register">Crie sua conta</h1>

        <div class="register-field">
            <p>Usuario</p>
            <input class="register-inputs" type="text" name="username">
        </div>

        <div class="register-field">
            <p>Senha</p>
            <input class="register-inputs" type="password" name="password1">
        </div>  

        <div class="register-field">
            <p>Confirmar Senha</p>
            <input class="register-inputs" type="password" name="password2">
        </div>

        <input type="submit" class="register-button" value="Registrar">
    </form>
</div>

{% endblock body %}
